<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jamanca{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            color-scheme: dark;
            --text: #e2e8f0;
            --muted: #8b9bb4;
            --accent: #3b82f6;
            --accent-soft: rgba(59,130,246,0.12);
        }
        html, body {
            min-height: 100%;
            background: radial-gradient(circle at top left, rgba(59,130,246,0.14), transparent 32%),
                        linear-gradient(180deg, #1e222b 0%, #0b1220 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .nav-panel {
            background: rgba(22, 27, 34, 0.98);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .nav-link.custom {
            color: var(--muted);
            font-weight: 500;
            transition: color .2s;
        }
        .nav-link.custom:hover, .nav-link.custom.active { color: #fff; }
        .page-title {
            font-size: clamp(1.8rem, 2.2vw, 2.6rem);
            color: #93c5fd;
            font-weight: 700;
        }
        .page-badge {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .45rem .85rem;
            background: var(--accent-soft);
            color: #93c5fd;
            border-radius: 999px;
            font-size: .85rem;
            font-weight: 600;
        }
        .card-surface {
            background: #0c111b !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 1rem;
        }
        .search-control {
            max-width: 360px;
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text);
        }
        .search-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.25);
            border-color: #3b82f6;
        }
        .info-pill { color: #93c5fd; font-weight: 600; }
        .action-button { border-radius: 999px; min-width: 140px; font-weight: 600; }
        .table-responsive {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 1rem;
            overflow: hidden;
        }
        .table { color: #fff; margin-bottom: 0; }
        .table thead { background: #1a1a1a; }
        .table thead th {
            color: #fff;
            font-weight: 800;
            border-color: rgba(255,255,255,0.15);
        }
        .table tbody td {
            color: #fff;
            font-weight: 600;
            border-color: rgba(255,255,255,0.08);
        }
        .table tbody tr:hover { background: #1a1a1a; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="nav-panel py-3">
        <div class="container-fluid d-flex flex-wrap align-items-center justify-content-between gap-3">
            <a href="{% url 'users:dashboard' %}" class="text-decoration-none text-white fw-bold fs-5">
                <i class="bi bi-cpu-fill text-primary me-2"></i>Jamanca
            </a>
            <div class="d-flex flex-wrap gap-2">
                <a href="{% url 'users:dashboard' %}" class="nav-link custom px-3">Panel</a>
                <a href="{% url 'users:personas' %}" class="nav-link custom px-3">Personas</a>
                <a href="{% url 'users:roles' %}" class="nav-link custom px-3">Roles</a>
                <a href="{% url 'users:perfiles' %}" class="nav-link custom px-3">Perfiles</a>
                <a href="{% url 'users:iconos' %}" class="nav-link custom px-3">Iconos</a>
                <a href="{% url 'users:rol_permisos' %}" class="nav-link custom px-3">Rol-Permisos</a>
            </div>
            <a href="/admin/" class="btn btn-sm btn-outline-light action-button">Admin</a>
        </div>
    </header>
    <main class="container-xxl py-4">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function filterTable(inputId, tableId) {
            const query = document.getElementById(inputId)?.value.toLowerCase().trim();
            document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(query) ? '' : 'none';
            });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
